<style>
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Manrope:wght@400;500;600&display=swap');

  :root {
    --bg: #f5f0e8;
    --card: #fffdf8;
    --accent: #2d6a4f;
    --accent2: #74c69d;
    --warn: #e76f51;
    --text: #1a1a1a;
    --muted: #888;
    --border: #e0d8c8;
    --done-bg: #e8f5ee;
    --done-text: #2d6a4f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Manrope', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
  }

  header {
    text-align: center;
    padding: 24px 16px 20px;
    margin-bottom: 8px;
  }

  header h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }

  header p { font-size: 13px; color: var(--muted); }

  .progress-bar-wrap {
    background: var(--border);
    border-radius: 99px;
    height: 6px;
    margin: 12px auto;
    max-width: 300px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.4s ease;
  }
  .progress-label { font-size: 12px; color: var(--muted); text-align: center; margin-top: 4px; }

  .day-nav {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 4px 0 12px;
    scrollbar-width: none;
  }
  .day-nav::-webkit-scrollbar { display: none; }

  .day-btn {
    flex-shrink: 0;
    padding: 8px 14px;
    border-radius: 99px;
    border: 1.5px solid var(--border);
    background: var(--card);
    font-family: 'Manrope', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .day-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .day-btn.completed { background: var(--done-bg); border-color: var(--accent2); color: var(--done-text); }

  .day-panel { display: none; }
  .day-panel.active { display: block; }

  .day-title { font-family: 'Unbounded', sans-serif; font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .day-subtitle { font-size: 12px; color: var(--muted); margin-bottom: 16px; }

  .section { margin-bottom: 14px; }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 8px;
    padding-left: 4px;
  }

  .task {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  .task:active { transform: scale(0.98); }
  .task.done { background: var(--done-bg); border-color: var(--accent2); opacity: 0.75; }

  .checkbox {
    width: 22px; height: 22px;
    border-radius: 6px;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    margin-top: 1px;
    background: white;
  }
  .task.done .checkbox { background: var(--accent); border-color: var(--accent); }
  .checkbox-icon { display: none; color: white; font-size: 13px; font-weight: 700; }
  .task.done .checkbox-icon { display: block; }

  .task-content { flex: 1; }
  .task-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; line-height: 1.3; }
  .task.done .task-name { text-decoration: line-through; color: var(--muted); }
  .task-detail { font-size: 12px; color: var(--muted); line-height: 1.4; }

  .note-box {
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 12px;
    line-height: 1.5;
    margin-bottom: 14px;
  }
  .note-box.yellow { background: #fff8e1; border: 1.5px solid #ffe082; color: #7c5c00; }
  .note-box.red { background: #fff0ee; border: 1.5px solid #ffb4a2; color: #9c2a10; }
  .note-box.blue { background: #e8f4fd; border: 1.5px solid #90caf9; color: #1565c0; }

  .new-badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 99px;
    background: #e76f51;
    color: white;
    margin-left: 6px;
    vertical-align: middle;
  }

  .reset-btn {
    display: block;
    margin: 20px auto 8px;
    padding: 10px 24px;
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 99px;
    font-family: 'Manrope', sans-serif;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
  }
</style>

let currentDay = 0;
const storage = JSON.parse(localStorage.getItem('lechenie_v2') || '{}');

function getKey(dayIdx, taskId) { return `v2_day${dayIdx}_${taskId}`; }
function isTaskDone(dayIdx, taskId) { return !!storage[getKey(dayIdx, taskId)]; }
function toggleTask(dayIdx, taskId) {
  const k = getKey(dayIdx, taskId);
  storage[k] = !storage[k];
  localStorage.setItem('lechenie_v2', JSON.stringify(storage));
  render();
}
function countDayTasks(dayIdx) {
  const day = DAYS[dayIdx];
  let total = 0, done = 0;
  day.sections.forEach(s => s.tasks.forEach(t => {
    total++;
    if (isTaskDone(dayIdx, t.id)) done++;
  }));
  return { total, done };
}

function render() {
  const nav = document.getElementById('dayNav');
  nav.innerHTML = DAYS.map((d, i) => {
    const { total, done } = countDayTasks(i);
    const isComplete = total > 0 && done === total;
    return `<button class="day-btn ${i===currentDay?'active':''} ${isComplete&&i!==currentDay?'completed':''}" onclick="switchDay(${i})">${d.label.replace('\n','<br>')}</button>`;
  }).join('');

  const panels = document.getElementById('panels');
  panels.innerHTML = DAYS.map((d, i) => {
    if (i !== currentDay) return `<div class="day-panel" id="panel${i}"></div>`;
    let html = `<div class="day-panel active" id="panel${i}">`;
    html += `<div class="day-title">${d.title}</div>`;
    html += `<div class="day-subtitle">${d.subtitle}</div>`;
    (d.notes || []).forEach(n => {
      html += `<div class="note-box ${n.type}">${n.text.replace(/\n/g,'<br>')}</div>`;
    });
    d.sections.forEach(s => {
      html += `<div class="section"><div class="section-title">${s.title}</div>`;
      s.tasks.forEach(t => {
        const done = isTaskDone(i, t.id);
        const badge = t.isNew ? '<span class="new-badge">НОВОЕ</span>' : '';
        html += `<div class="task ${done?'done':''}" onclick="toggleTask(${i},'${t.id}')">
          <div class="checkbox"><span class="checkbox-icon">✓</span></div>
          <div class="task-content">
            <div class="task-name">${t.name}${badge}</div>
            <div class="task-detail">${t.detail}</div>
          </div>
        </div>`;
      });
      html += `</div>`;
    });
    html += `</div>`;
    return html;
  }).join('');

  const { total, done } = countDayTasks(currentDay);
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${done} из ${total} выполнено сегодня`;
}

function switchDay(i) { currentDay = i; render(); window.scrollTo(0,0); }
function resetDay() {
  DAYS[currentDay].sections.forEach(s => s.tasks.forEach(t => {
    delete storage[getKey(currentDay, t.id)];
  }));
  localStorage.setItem('lechenie_v2', JSON.stringify(storage));
  render();
}
