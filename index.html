<html lang="ru">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>План лечения</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Manrope:wght@400;500;600&display=swap');

  :root {
    --bg: #f5f0e8;
    --card: #fffdf8;
    --accent: #2d6a4f;
    --accent2: #74c69d;
    --warn: #e76f51;
    --text: #1a1a1a;
    --muted: #888;
    --border: #e0d8c8;
    --done-bg: #e8f5ee;
    --done-text: #2d6a4f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Manrope', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
  }

  header {
    text-align: center;
    padding: 24px 16px 20px;
    margin-bottom: 8px;
  }

  header h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }

  header p {
    font-size: 13px;
    color: var(--muted);
  }

  .progress-bar-wrap {
    background: var(--border);
    border-radius: 99px;
    height: 6px;
    margin: 12px auto;
    max-width: 300px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    margin-top: 4px;
  }

  .day-nav {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 4px 0 12px;
    scrollbar-width: none;
  }
  .day-nav::-webkit-scrollbar { display: none; }

  .day-btn {
    flex-shrink: 0;
    padding: 8px 14px;
    border-radius: 99px;
    border: 1.5px solid var(--border);
    background: var(--card);
    font-family: 'Manrope', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .day-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .day-btn.completed {
    background: var(--done-bg);
    border-color: var(--accent2);
    color: var(--done-text);
  }

  .day-panel { display: none; }
  .day-panel.active { display: block; }

  .day-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 4px;
    color: var(--text);
  }
  .day-subtitle {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .section {
    margin-bottom: 14px;
  }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 8px;
    padding-left: 4px;
  }

  .task {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }

  .task:active { transform: scale(0.98); }

  .task.done {
    background: var(--done-bg);
    border-color: var(--accent2);
    opacity: 0.75;
  }

  .checkbox {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    margin-top: 1px;
    background: white;
  }

  .task.done .checkbox {
    background: var(--accent);
    border-color: var(--accent);
  }

  .checkbox-icon {
    display: none;
    color: white;
    font-size: 13px;
    font-weight: 700;
  }
  .task.done .checkbox-icon { display: block; }

  .task-content { flex: 1; }

  .task-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
    line-height: 1.3;
  }
  .task.done .task-name {
    text-decoration: line-through;
    color: var(--muted);
  }

  .task-detail {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.4;
  }

  .tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 99px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .tag-eye { background: #dbeafe; color: #1d4ed8; }
  .tag-pill { background: #fef3c7; color: #92400e; }
  .tag-shot { background: #fce7f3; color: #9d174d; }
  .tag-throat { background: #ede9fe; color: #5b21b6; }
  .tag-warn { background: #fee2e2; color: #991b1b; }

  .note-box {
    background: #fff8e1;
    border: 1.5px solid #ffe082;
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 12px;
    color: #7c5c00;
    margin-bottom: 14px;
    line-height: 1.5;
  }

  .reset-btn {
    display: block;
    margin: 20px auto 8px;
    padding: 10px 24px;
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 99px;
    font-family: 'Manrope', sans-serif;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
  }
</style>
</head>

          { id:"d5t6", name:"Вит C эстер 1000 мг", detail:"× 4 раза в день после еды" },
        ]
      },
      {
        title: "🌙 Вечер / перед сном",
        tasks: [
          { id:"d5t7", name:"Посиформин 2% (левый глаз)", detail:"2 р/д до 14 мая, затем только на ночь до 21 мая" },
          { id:"d5t8", name:"Гидрокортизон ПОС (левый глаз)", detail:"Мазь на кожу века — до 21 мая" },

  {
    label: "16–21 мая\nФинал",
    title: "16–21 мая — Завершение",
    subtitle: "Постепенно отменяем препараты.",
    note: "✅ 16 мая: последний Лавомакс (6-я таблетка), последний Офтальмоферон, последний Малавит+Исмиген. С 17 мая — только мази и витамины.",
    sections: [
      {
        title: "До 21 мая ежедневно",
        tasks: [
          { id:"d6t1", name:"Посиформин 2% (левый глаз)", detail:"Только на ночь — до 21 мая" },
          { id:"d6t2", name:"Гидрокортизон ПОС (левый глаз)", detail:"Мазь на кожу века 2 р/д — до 21 мая" },
          { id:"d6t3", name:"Цинк пиколинат 50 мг", detail:"Вечером после еды — до 21 мая" },
          { id:"d6t4", name:"Вит D 5000 МЕ", detail:"Каждое утро — ещё ~3 недели (до ~7 июня)" },
          { id:"d6t5", name:"Вит C 500 мг", detail:"× 2 раза в день — 2 недели (с ~17 мая)" },
        ]
      }
    ]
  },
];

let currentDay = 0;
const storage = {};

function getKey(dayIdx, taskId) { return `day${dayIdx}_${taskId}`; }

function isTaskDone(dayIdx, taskId) {
  return !!storage[getKey(dayIdx, taskId)];
}

function toggleTask(dayIdx, taskId) {
  const k = getKey(dayIdx, taskId);
  storage[k] = !storage[k];
  render();
}

function countDayTasks(dayIdx) {
  const day = DAYS[dayIdx];
  let total = 0, done = 0;
  day.sections.forEach(s => s.tasks.forEach(t => {
    total++;
    if (isTaskDone(dayIdx, t.id)) done++;
  }));
  return { total, done };
}

function render() {
  // Nav
  const nav = document.getElementById('dayNav');
  nav.innerHTML = DAYS.map((d, i) => {
    const { total, done } = countDayTasks(i);
    const isComplete = total > 0 && done === total;
    return `<button class="day-btn ${i===currentDay?'active':''} ${isComplete&&i!==currentDay?'completed':''}" onclick="switchDay(${i})">${d.label.replace('\n','<br>')}</button>`;
  }).join('');

  // Panels
  const panels = document.getElementById('panels');
  panels.innerHTML = DAYS.map((d, i) => {
    if (i !== currentDay) return `<div class="day-panel" id="panel${i}"></div>`;
    let html = `<div class="day-panel active" id="panel${i}">`;
    html += `<div class="day-title">${d.title}</div>`;
    html += `<div class="day-subtitle">${d.subtitle}</div>`;
    if (d.note) html += `<div class="note-box">${d.note}</div>`;
    d.sections.forEach(s => {
      html += `<div class="section"><div class="section-title">${s.title}</div>`;
      s.tasks.forEach(t => {
        const done = isTaskDone(i, t.id);
        html += `<div class="task ${done?'done':''}" onclick="toggleTask(${i},'${t.id}')">
          <div class="checkbox"><span class="checkbox-icon">✓</span></div>
          <div class="task-content">
            <div class="task-name">${t.name}</div>
            <div class="task-detail">${t.detail}</div>
          </div>
        </div>`;
      });
      html += `</div>`;
    });
    html += `</div>`;
    return html;
  }).join('');

  // Progress
  const { total, done } = countDayTasks(currentDay);
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${done} из ${total} выполнено сегодня`;
}

function switchDay(i) {
  currentDay = i;
  render();
  window.scrollTo(0, 0);
}

function resetDay() {
  const day = DAYS[currentDay];
  day.sections.forEach(s => s.tasks.forEach(t => {
    delete storage[getKey(currentDay, t.id)];
  }));
  render();
}

render();
</script>
