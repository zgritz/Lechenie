<html lang="ru">

<title>План лечения</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Manrope:wght@400;500;600&display=swap');

  :root {
    --bg: #f5f0e8;
    --card: #fffdf8;
    --accent: #2d6a4f;
    --accent2: #74c69d;
    --text: #1a1a1a;
    --muted: #888;
    --border: #e0d8c8;
    --done-bg: #e8f5ee;
    --done-text: #2d6a4f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Manrope', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
  }

  header { text-align: center; padding: 20px 16px 16px; margin-bottom: 8px; }
  header h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: 18px; font-weight: 700;
    color: var(--accent); letter-spacing: -0.5px; margin-bottom: 4px;
  }
  header p { font-size: 12px; color: var(--muted); }

  .progress-bar-wrap {
    background: var(--border); border-radius: 99px;
    height: 6px; margin: 10px auto; max-width: 300px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; background: var(--accent);
    border-radius: 99px; transition: width 0.4s ease;
  }
  .progress-label { font-size: 12px; color: var(--muted); text-align: center; margin-top: 4px; }

  .day-nav {
    display: flex; gap: 6px; overflow-x: auto;
    padding: 4px 0 12px; scrollbar-width: none;
  }
  .day-nav::-webkit-scrollbar { display: none; }

  .day-btn {
    flex-shrink: 0; padding: 8px 14px; border-radius: 99px;
    border: 1.5px solid var(--border); background: var(--card);
    font-family: 'Manrope', sans-serif; font-size: 12px; font-weight: 600;
    color: var(--muted); cursor: pointer; transition: all 0.2s;
    white-space: nowrap; line-height: 1.4; text-align: center;
  }
  .day-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .day-btn.completed { background: var(--done-bg); border-color: var(--accent2); color: var(--done-text); }
  .day-btn.today-marker { border-color: #f59e0b; border-width: 2px; }

  .day-panel { display: none; }
  .day-panel.active { display: block; }

  .day-title { font-family: 'Unbounded', sans-serif; font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .day-subtitle { font-size: 12px; color: var(--muted); margin-bottom: 14px; }

  .section { margin-bottom: 14px; }
  .section-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; padding-left: 4px;
  }

  .task {
    display: flex; align-items: flex-start; gap: 12px;
    background: var(--card); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 12px 14px; margin-bottom: 8px;
    cursor: pointer; transition: all 0.2s; user-select: none;
  }
  .task:active { transform: scale(0.98); }
  .task.done { background: var(--done-bg); border-color: var(--accent2); opacity: 0.75; }

  .checkbox {
    width: 22px; height: 22px; border-radius: 6px;
    border: 2px solid var(--border); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; margin-top: 1px; background: white;
  }
  .task.done .checkbox { background: var(--accent); border-color: var(--accent); }
  .checkbox-icon { display: none; color: white; font-size: 13px; font-weight: 700; }
  .task.done .checkbox-icon { display: block; }

  .task-content { flex: 1; }
  .task-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; line-height: 1.3; }
  .task.done .task-name { text-decoration: line-through; color: var(--muted); }
  .task-detail { font-size: 12px; color: var(--muted); line-height: 1.4; }

  .note-box {
    border-radius: 12px; padding: 12px 14px;
    font-size: 12px; line-height: 1.5; margin-bottom: 12px;
  }
  .note-box.yellow { background: #fff8e1; border: 1.5px solid #ffe082; color: #7c5c00; }
  .note-box.red    { background: #fff0ee; border: 1.5px solid #ffb4a2; color: #9c2a10; }
  .note-box.blue   { background: #e8f4fd; border: 1.5px solid #90caf9; color: #1565c0; }
  .note-box.green  { background: #e8f5ee; border: 1.5px solid #74c69d; color: #2d6a4f; }

  .new-badge {
    display: inline-block; font-size: 9px; font-weight: 700;
    padding: 2px 6px; border-radius: 99px;
    background: #e76f51; color: white; margin-left: 6px; vertical-align: middle;
  }

  .bottom-btns {
    display: flex; gap: 8px; justify-content: center;
    margin: 20px 0 8px; flex-wrap: wrap;
  }
  .btn-outline {
    padding: 10px 20px; background: none;
    border: 1.5px solid var(--border); border-radius: 99px;
    font-family: 'Manrope', sans-serif; font-size: 12px; color: var(--muted); cursor: pointer;
  }
  .btn-accent {
    padding: 10px 20px; background: var(--accent); border: none;
    border-radius: 99px; font-family: 'Manrope', sans-serif;
    font-size: 12px; color: white; cursor: pointer;
  }
</style>

        {id:"d10_5",name:"Метабиотик",detail:"2 р/д на стакан воды"},
        {id:"d10_6",name:"Мирамистин (оба)",detail:"Туалет век — продолжать"},
      ]},
    ]
  },
];

// ── Storage ──────────────────────────────────────────────────────────────────
const storage = JSON.parse(localStorage.getItem('lechenie_v3') || '{}');

function getTodayIndex() {
  const today = new Date().toISOString().slice(0,10);
  let best = 0;
  for (let i = 0; i < DAYS.length; i++) {
    if (DAYS[i].date <= today) best = i;
  }
  return best;
}

let currentDay = (() => {
  const saved = localStorage.getItem('lechenie_v3_day');
  if (saved !== null) {
    const n = parseInt(saved, 10);
    if (!isNaN(n) && n >= 0 && n < DAYS.length) return n;
  }
  return getTodayIndex();
})();

function saveDay() { localStorage.setItem('lechenie_v3_day', String(currentDay)); }
function getKey(di, tid) { return `v3_${di}_${tid}`; }
function isTaskDone(di, tid) { return !!storage[getKey(di,tid)]; }

function toggleTask(di, tid) {
  const k = getKey(di,tid);
  storage[k] = !storage[k];
  localStorage.setItem('lechenie_v3', JSON.stringify(storage));
  render();
}

function countDayTasks(di) {
  let total=0, done=0;
  DAYS[di].sections.forEach(s=>s.tasks.forEach(t=>{
    total++;
    if(isTaskDone(di,t.id)) done++;
  }));
  return {total,done};
}

function switchDay(i) { currentDay=i; saveDay(); render(); window.scrollTo(0,0); }
function goToday() { switchDay(getTodayIndex()); }

function resetDay() {
  DAYS[currentDay].sections.forEach(s=>s.tasks.forEach(t=>{
    delete storage[getKey(currentDay,t.id)];
  }));
  localStorage.setItem('lechenie_v3', JSON.stringify(storage));
  render();
}

function render() {
  const todayIdx = getTodayIndex();

  // Nav
  document.getElementById('dayNav').innerHTML = DAYS.map((d,i)=>{
    const {total,done} = countDayTasks(i);
    const complete = total>0 && done===total;
    let cls = 'day-btn';
    if (i===currentDay) cls+=' active';
    else if (complete) cls+=' completed';
    if (i===todayIdx && i!==currentDay) cls+=' today-marker';
    return `<button class="${cls}" onclick="switchDay(${i})">${d.label.replace('\n','<br>')}</button>`;
  }).join('');

  // Panel
  const d = DAYS[currentDay];
  let html = `<div class="day-panel active">
    <div class="day-title">${d.title}</div>
    <div class="day-subtitle">${d.subtitle}</div>`;
  (d.notes||[]).forEach(n=>{
    html+=`<div class="note-box ${n.type}">${n.text.replace(/\n/g,'<br>')}</div>`;
  });
  d.sections.forEach(s=>{
    html+=`<div class="section"><div class="section-title">${s.title}</div>`;
    s.tasks.forEach(t=>{
      const done=isTaskDone(currentDay,t.id);
      const badge=t.isNew?'<span class="new-badge">НОВОЕ</span>':'';
      html+=`<div class="task ${done?'done':''}" onclick="toggleTask(${currentDay},'${t.id}')">
        <div class="checkbox"><span class="checkbox-icon">✓</span></div>
        <div class="task-content">
          <div class="task-name">${t.name}${badge}</div>
          <div class="task-detail">${t.detail}</div>
        </div>
      </div>`;
    });
    html+=`</div>`;
  });
  html+=`</div>`;
  document.getElementById('panels').innerHTML = html;

  // Progress
  const {total,done} = countDayTasks(currentDay);
  const pct = total>0 ? Math.round(done/total*100) : 0;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = `${done} из ${total} выполнено`;
}

render();
</script>
</body>
</html>
